site_name: GTDonation
site_url: https://go-tiger.github.io/GTDonation
site_description: GTDonation 플러그인 공식 문서
repo_url: https://github.com/go-tiger/GTDonation
repo_name: go-tiger/GTDonation

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - 홈: index.md
  - 설치하기: installation.md
  - 시작하기: getting-started.md
  - GTDonation-Core:
    - 이벤트: core/events.md
  - GTDonation-Chzzk:
    - 설정: chzzk/configuration.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
